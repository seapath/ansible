---
- name: Restart systemd-journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted
    enabled: true

- name: Update-grub
  ansible.builtin.command: "{{ configure_seapath_distro_grub_update_command }}"
  changed_when: true
