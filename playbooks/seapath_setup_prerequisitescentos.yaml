---
- name: CentOS machine prerequisites
  gather_facts: true
  hosts:
    - cluster_machines
    - standalone_machine
    - VMs
  become: true
  roles:
    - syslog_ng_client
    - role: configure_seapath_distro
      vars:
        configure_seapath_distro_vim_config_dir: /etc
        configure_seapath_distro_grub_update_command: grub2-mkconfig -o /boot/grub2/grub.cfg
- name: CentOS physical machine prerequisites
  hosts:
    - cluster_machines
    - standalone_machine
  become: true
  roles:
    - role: configure_physical_machine
      vars:
        configure_physical_machine_distro_extra_modules:
          - br_netfilter
          - raid6_pq
        configure_physical_machine_initramfs: dracut
- name: CentOS hypervisor prerequisites
  hosts:
    - hypervisors
    - standalone_machine
  become: true
  roles:
    - role: configure_hypervisor
      vars:
        configure_hypervisor_tuned_profiles_dir: /etc/tuned

- name: Add admin user to haclient group
  hosts:
    - cluster_machines
  become: true
  tasks:
    - name: Add admin user to haclient group
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: haclient
        append: true

- name: Disable libvirt-guests.service
  hosts:
    - cluster_machines
  become: true
  tasks:
    - name: Disable libvirt-guests.service
      ansible.builtin.systemd:
        name: libvirt-guests.service
        enabled: false
        state: stopped

- name: Upload extra files
  hosts:
    - cluster_machines
    - standalone_machine
    - VMs
  become: true
  roles:
    - upload_extra_files
