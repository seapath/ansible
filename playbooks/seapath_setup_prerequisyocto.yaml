# This Ansible playbook configures a SEAPATH machine.
# It launches the Yocto flavor specific tasks

---
- name: Add kernel parameters
  hosts:
    - cluster_machines
    - standalone_machine
  become: true
  roles:
    - yocto/kernel_params

- name: Configure hugepages
  hosts: hypervisors
  become: true
  roles:
    - yocto/hugepages

- name: Configure SR-IOV
  hosts: hypervisors
  become: true
  roles:
    - yocto/sriov

- name: Upload extra files
  hosts:
    - cluster_machines
    - standalone_machine
    - VMs
  become: true
  roles:
    - upload_extra_files
