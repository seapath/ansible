# Run script to send SV from pcap file

- hosts: publisher_machines
  name: Run Test
  become: true
  vars:
    - home: /root
    - script_name: "ci_publish_sv.sh"
  tasks:
    - name: "Prepare Publisher"
      file:
        path: "{{ item }}"
        state: directory
      loop:
          - "{{ home }}/tests"
          - "{{ home }}/tests/results"
          - "{{ home }}/tests/pcaps"

    - name: "Copy pcap file on publisher"
      copy:
        src: "{{ pcap_path }}"
        dest: "{{ home }}/tests/pcaps"

    - name: "Copy script on publisher"
      copy:
        src: "../scripts/{{ script_name }}"
        dest: "{{ home }}"
        mode: "0755"

    - name: "Execute script on publisher"
      shell: "{{ home }}/{{ script_name }} {{ sv_interface }} \
              {{ home }}/tests {{pcap_file}} "
      register: cmd

    - debug: msg="{{ cmd.stderr }}"

