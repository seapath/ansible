---
- name: "Configure login.defs"
  ansible.builtin.lineinfile:
    dest: /etc/login.defs
    regexp: "^{{ item }}$"
    line: "{{ item }}"
    state: present
  with_items:
    - PASS_MAX_DAYS 90
  when: not revert
- name: "Unconfigure login.defs"
  ansible.builtin.lineinfile:
    dest: /etc/login.defs
    regexp: "^{{ item }}$"
    state: absent
  with_items:
    - PASS_MAX_DAYS 90
  when: revert
