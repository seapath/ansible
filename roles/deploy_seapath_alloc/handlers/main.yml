---
- name: Restart seapath-alloc-export timer
  ansible.builtin.systemd:
    name: seapath-alloc-export.timer
    state: restarted
    daemon_reload: true

- name: Restart libvirtd
  ansible.builtin.systemd:
    name: libvirtd
    state: restarted
