name: CI Yocto

env:
  WORK_DIR: /tmp/seapath_ci_${{ github.run_id }}_${{ github.run_attempt }}_${{ github.sha }}
on:
  workflow_call:
    inputs:
      pcap_loop:
        default: 60
        required: false
        type: number
      weekly:
        default: false
        required: false
        type: boolean
  workflow_dispatch:

permissions:
  checks: write

jobs:
  call-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Welotec RSAPC Mk2
            inventory: ci_yocto_standalone.yaml
            vms-inventory: ci_vms.yaml
          - name: Aaeon ARM I.MX8P-2G
            inventory: ci_yocto_standalone_aaeon.yaml
    uses: ./.github/workflows/_tests.yml
    name: Run tests on ${{ matrix.name }}
    with:
      seapath-flavor: "Yocto ${{ matrix.name }}"
      hyp-inventory-name: ${{ matrix.inventory }}
      vms-inventory-name: ${{ matrix.vms-inventory }}
      runner-label: "runner-SFL"
