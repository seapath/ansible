---
- name: "Add initramfs-tools scripts: script file (LVM rebooter and log handling)"
  ansible.builtin.copy:
    src: initramfs-tools/scripts/
    dest: /etc/initramfs-tools/scripts/
    mode: "0755"
  notify: Rebuild initramfs if necessary

- name: Get the /var/log/ device
  ansible.builtin.command: "findmnt -n -o SOURCE --target /var/log"
  register: debian_physical_machine_varlog_dev
  changed_when: false

- name: Set fact /var/log/ device
  ansible.builtin.set_fact:
    debian_physical_machine_lvm_rebooter_log_device: "{{ debian_physical_machine_varlog_dev.stdout }}"

- name: Get the /var/log/ relative path
  ansible.builtin.shell: "realpath --relative-to=$(findmnt -n -o TARGET --target /var/log/) /var/log"
  register: debian_physical_machine_varlog_path
  changed_when: false

- name: Set fact /var/log/ relative path
  ansible.builtin.set_fact:
    debian_physical_machine_lvm_rebooter_log_path: "{{ debian_physical_machine_varlog_path.stdout }}"

- name: Copy rebooter.conf # noqa: risky-file-permissions
  ansible.builtin.template:
    src: initramfs-tools/conf.d/rebooter.conf.j2
    dest: /etc/initramfs-tools/conf.d/rebooter.conf

- name: Configure initramfs-tools to use busybox
  ansible.builtin.lineinfile:
    dest: /etc/initramfs-tools/initramfs.conf
    regexp: "^#?BUSYBOX="
    line: "BUSYBOX=y"
    state: present
  notify: Rebuild initramfs if necessary
