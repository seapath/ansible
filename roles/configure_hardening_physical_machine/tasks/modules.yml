---
- name: "Force loading nf_conntrack at boot"
  ansible.builtin.lineinfile:
    dest: /etc/modules-load.d/modules.conf
    regexp: "^nf_conntrack$"
    line: "nf_conntrack"
    state: present
  when: not revert
- name: "Disable force loading nf_conntrack at boot"
  ansible.builtin.lineinfile:
    dest: /etc/modules-load.d/modules.conf
    regexp: "^nf_conntrack$"
    state: absent
  when: revert
