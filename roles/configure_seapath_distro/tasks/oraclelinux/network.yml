---
- name: Stop and Disable firewalld
  ansible.builtin.service:
    name: firewalld
    state: stopped
    enabled: false

- name: Stop and Disable NetworkManager
  ansible.builtin.service:
    name: NetworkManager
    state: stopped
    enabled: false

- name: Start and Enable systemd-networkd
  ansible.builtin.service:
    name: systemd-networkd
    state: started
    enabled: true
