---
- name: Converge
  hosts: all
  gather_facts: false
  vars:
    podman_registry_mirror_url: registry.internal.local:5000
    podman_registry_mirror_ca_cert_path: /tmp/podman-registry-mirror-tls-ca.crt
    podman_registry_mirror_tls_enabled: true
  roles:
    - role: podman_registry_mirror

...