---
- name: Get tuned version
  ansible.builtin.command: tuned --version
  register: debian_hypervisor_tuned_version_output
  changed_when: false
  failed_when: debian_hypervisor_tuned_version_output.rc != 0

- name: Extract tuned version number
  ansible.builtin.set_fact:
    debian_hypervisor_tuned_version: "{{ debian_hypervisor_tuned_version_output.stdout | regex_search('\\d+\\.\\d+', '\\0') | first }}"

- name: Determine tuned profile path
  ansible.builtin.set_fact:
    debian_hypervisor_tuned_profile_path: "{{ '/etc/tuned/profiles/seapath-rt-host' if debian_hypervisor_tuned_version is version('2.22', '>=') else '/etc/tuned/seapath-rt-host' }}"

- name: Create tuned seapath-rt profile folder
  ansible.builtin.file:
    path: "{{ debian_hypervisor_tuned_profile_path }}"
    state: directory
    mode: "0755"

- name: Tuned path
  ansible.builtin.set_fact:
    debian_hypervisor_tuned_path: "{{ custom_tuned_profile_path if custom_tuned_profile_path is defined else 'tuned.conf.j2' }}"

- name: Copy seapath-rt-host tuned profile conf
  ansible.builtin.template:
    src: "{{ debian_hypervisor_tuned_path }}"
    dest: "{{ debian_hypervisor_tuned_profile_path }}/tuned.conf"
    group: root
    owner: root
    mode: "0644"

- name: Remove tuned dynamic tuning
  ansible.builtin.lineinfile:
    path: /etc/tuned/tuned-main.conf
    state: present
    regexp: "^#?dynamic_tuning = .*$"
    line: "dynamic_tuning = 0"

- name: Enable tuned.service
  ansible.builtin.systemd:
    name: tuned.service
    enabled: true
    state: restarted

- name: Load seapath-rt-host tuned profile
  ansible.builtin.command: tuned-adm profile seapath-rt-host
  when: isolcpus is defined
  changed_when: true

- name: Unload tuned profile
  ansible.builtin.command: tuned-adm off
  when: isolcpus is not defined
  changed_when: true
