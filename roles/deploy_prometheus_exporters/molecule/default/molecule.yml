---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: observer
    image: docker.io/geerlingguy/docker-debian13-ansible:latest
    privileged: true
    command: /sbin/init
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: "${MOLECULE_PROJECT_DIRECTORY}/.."
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      observer:
        seapath_distro: Debian
        ip_addr: 10.10.10.10
        deploy_prometheus_exporters_exporters:
          - node-exporter
        deploy_prometheus_exporters_node_exporter_image: quay.io/prometheus/node-exporter:latest
        deploy_prometheus_exporters_manage_services: false

verifier:
  name: ansible
