---

- name: Check for existing installation (ceph-ansible only)
  when: not ceph_prepare_installation_is_using_cephadm
  block:
    - name: Create Ceph log directory
      ansible.builtin.file:
        path: /var/log/ceph
        owner: ceph
        group: ceph
        mode: "0770"
        state: directory
    - name: Create Ceph crash directory
      ansible.builtin.file:
        path: /var/lib/ceph/crash/posted
        owner: ceph
        group: ceph
        mode: "0770"
        state: directory
      register: ceph_prepare_installation_new_ceph_installation

- name: Prepare OSD disk # noqa: no-handler
  when:
    - ceph_prepare_installation_new_ceph_installation.changed | default(false) or ceph_prepare_installation_is_using_cephadm
  block:
    - name: Refresh LVM VG
      ansible.builtin.command:
        cmd: vgchange --refresh
      changed_when: true
    - name: Cleanup LV if we are in existing LV situation
      when:
        - lvm_volumes is defined
        - ansible_lvm['lvs'][lvm_volumes[0].data] is defined
        - not ceph_prepare_installation_is_using_cephadm
      ansible.builtin.command: "ceph-volume lvm zap /dev/{{ lvm_volumes[0].data_vg }}/{{ lvm_volumes[0].data }}"
      changed_when: true
    - name: Create Ceph LVM on full disk when lvm_volumes is not defined
      when:
        - lvm_volumes is not defined
        - ceph_osd_disk is defined
        - ansible_lvm is not defined
          or ansible_lvm['lvs'] is not defined
          or ansible_lvm['lvs']['lv_ceph'] is not defined
          or ceph_prepare_installation_flush_osds | bool
      block:
        - name: Get real path for OSD disk for auto LVM
          ansible.builtin.command: "realpath {{ ceph_osd_disk }}"
          register: ceph_prepare_installation_auto_ceph_osd_realdisk
          changed_when: false
        - name: Check if OSD disk exists
          ansible.builtin.stat:
            path: "{{ ceph_prepare_installation_auto_ceph_osd_realdisk.stdout }}"
          register: ceph_prepare_installation_disk_stat
        - name: Fail if OSD disk does not exist
          ansible.builtin.fail:
            msg: "The OSD disk {{ ceph_osd_disk }} does not exist."
          when: not ceph_prepare_installation_disk_stat.stat.exists
        - name: Zap OSD disk for auto LVM
          ansible.builtin.command: "{{ ceph_prepare_installation_ceph_volume_cmd }} lvm zap {{ ceph_prepare_installation_auto_ceph_osd_realdisk.stdout }} --destroy"
          changed_when: true
        - name: Create full disk partition with LVM flag
          community.general.parted:
            device: "{{ ceph_prepare_installation_auto_ceph_osd_realdisk.stdout }}"
            number: 1
            label: gpt
            part_start: "0%"
            part_end: "100%"
            flags:
              - lvm
            state: present
          register: ceph_prepare_installation_full_disk_part
        - name: Get disk/by-path of OSD disk
          ansible.builtin.command: "/usr/bin/find -L /dev/disk/by-path -samefile {{ ceph_prepare_installation_full_disk_part.disk.dev }} -print -quit"
          register: ceph_prepare_installation_ceph_osd_finddisk
          changed_when: false
        - name: Create volume group vg_ceph
          community.general.lvg:
            vg: vg_ceph
            pvs: "{{ ceph_prepare_installation_ceph_osd_finddisk.stdout }}-part1"
        - name: Create logical volume lv_ceph
          community.general.lvol:
            vg: vg_ceph
            lv: lv_ceph
            size: 100%VG
    - name: Create VG/LV if they don't exist
      when:
        - lvm_volumes is defined
        - ansible_lvm['lvs'][lvm_volumes[0].data] is not defined
      block:
        - name: Get real path for OSD disk
          ansible.builtin.command: "realpath {{ ceph_osd_disk }}"
          register: ceph_prepare_installation_ceph_osd_realdisk
          changed_when: false
        - name: Cleanup Ceph OSD disks with ceph-volume
          ansible.builtin.command: "{{ ceph_prepare_installation_ceph_volume_cmd }} lvm zap {{ ceph_prepare_installation_ceph_osd_realdisk.stdout }} --destroy"
          when:
            - lvm_volumes[0].device_number == 1
          changed_when: true
        - name: Create volumes for OSD disk
          when:
            - lvm_volumes is defined
          block:
            - name: Get partition info
              community.general.parted:
                device: "{{ ceph_prepare_installation_ceph_osd_realdisk.stdout }}"
                unit: MiB
                state: info
              register: ceph_prepare_installation_parted_info

            - name: Check if current partition exists
              ansible.builtin.set_fact:
                ceph_prepare_installation_current_exists: >-
                  {{ ceph_prepare_installation_parted_info.partitions
                     | selectattr('num', 'equalto', lvm_volumes[0].device_number)
                     | list | length > 0 }}

            - name: Check if previous partition exists
              ansible.builtin.set_fact:
                ceph_prepare_installation_previous_exists: >-
                  {{ lvm_volumes[0].device_number > 1 and (
                       ceph_prepare_installation_parted_info.partitions
                       | selectattr('num', 'equalto', lvm_volumes[0].device_number - 1)
                       | list | length > 0 ) }}

            - name: Set ceph_prepare_installation_prev_end based on previous partition or zero
              ansible.builtin.set_fact:
                ceph_prepare_installation_prev_end: >-
                  {{ (
                        ceph_prepare_installation_parted_info.partitions
                        | selectattr('num', 'equalto', lvm_volumes[0].device_number - 1)
                        | map(attribute='end')
                        | first
                      ) | float if ceph_prepare_installation_previous_exists else 0.0 }}

            - ansible.builtin.debug: # noqa: name[missing]
                var: ceph_prepare_installation_prev_end
            - ansible.builtin.debug: # noqa: name[missing]
                var: lvm_volumes[0].device_size
            - ansible.builtin.debug: # noqa: name[missing]
                msg: "{{ ((ceph_prepare_installation_prev_end | float) + (lvm_volumes[0].device_size | float)) | round(2) }}"

            - name: Calculate partition boundaries
              ansible.builtin.set_fact:
                ceph_prepare_installation_part_start: "{{ '0%' if (ceph_prepare_installation_prev_end | float) == 0 else (ceph_prepare_installation_prev_end | float | round(2)) ~ 'MiB' }}"
                ceph_prepare_installation_part_end: "{{ ((ceph_prepare_installation_prev_end | float) + (lvm_volumes[0].device_size | float) | float) | round(2) }}MiB"
              when: ceph_prepare_installation_previous_exists or lvm_volumes[0].device_number == 1

            - name: Create partition, VG and LV
              when:
                - not ceph_prepare_installation_current_exists
                - ceph_prepare_installation_previous_exists or lvm_volumes[0].device_number == 1
              block:
                - name: Create partition using parted module
                  community.general.parted:
                    device: "{{ ceph_prepare_installation_ceph_osd_realdisk.stdout }}"
                    number: "{{ lvm_volumes[0].device_number }}"
                    label: gpt
                    name: ""
                    part_start: "{{ ceph_prepare_installation_part_start }}"
                    part_end: "{{ ceph_prepare_installation_part_end }}"
                    flags:
                      - lvm
                    state: present
                  register: ceph_prepare_installation_ceph_osd_result
                - name: Get disk/by-path of OSD disk
                  ansible.builtin.command: "/usr/bin/find -L /dev/disk/by-path -samefile {{ ceph_prepare_installation_ceph_osd_result.disk.dev }} -print -quit"
                  register: ceph_prepare_installation_ceph_osd_finddisk
                  changed_when: false
                - name: Create volume group on the partition
                  community.general.lvg:
                    vg: "{{ lvm_volumes[0].data_vg }}"
                    pvs: "{{ ceph_prepare_installation_ceph_osd_finddisk.stdout }}-part{{ lvm_volumes[0].device_number }}"
                - name: Create logical volume in the VG
                  community.general.lvol:
                    vg: "{{ lvm_volumes[0].data_vg }}"
                    lv: "{{ lvm_volumes[0].data }}"
                    size: "{{ lvm_volumes[0].data_size }}"
