---
- name: Prerequis machine centos
  gather_facts: true
  hosts:
    - cluster_machines
    - standalone_machine
    - VMs
  become: true
  roles:
    - syslog_ng_client
    - centos
- name: Prerequis physical machine centos
  hosts:
    - cluster_machines
    - standalone_machine
  become: true
  roles:
    - centos_physical_machine
- name: Prerequis hypervisor centos
  hosts:
    - hypervisors
    - standalone_machine
  become: true
  roles:
    - centos_hypervisor

- name: Add admin user to haclient group
  hosts:
    - cluster_machines
  become: true
  tasks:
    - name: Add admin user to haclient group
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: haclient
        append: true

- name: Disable libvirt-guests.service
  hosts:
    - cluster_machines
  become: true
  tasks:
    - name: Disable libvirt-guests.service
      ansible.builtin.systemd:
        name: libvirt-guests.service
        enabled: false
        state: stopped

- name: Upload extra files
  hosts:
    - cluster_machines
    - standalone_machine
    - VMs
  become: true
  roles:
    - upload_extra_files
