---
all:
  children:
    standalone_machine:
      children:
        hypervisors:
          hosts:
            rtei-demoHyp:
              ansible_host: "192.168.216.73"
              ip_addr: "{{ ansible_host }}"
              network_interface: "enp0s20f0u7"
              cluster_interface: "{{ network_interface }}"
              gateway_addr: "192.168.216.1"
              dns_server: "{{ gateway_addr }}"
              ntp_servers: "{{ gateway_addr }}"
              syslog_server_ip: "{{ gateway_addr }}"
              apply_network_config: false
              kernel_parameters_restart: false
              ignored_bridges: []
              nics_affinity:
              - enp88s0: 3
              ptp_interface: "enp0s20f0u3"
              ovs_bridges:
                - name: ovsbr
                  ports:
                    - name: VM1.0
                      type: tap
                    - name: ovsbr_ext
                      type: system
                      interface: "enp0s20f0u3"
              upload_files: # This file is given with the ssc600 sw package
                - src: '../files/qemu.hook'
                  dest: '/etc/libvirt/hooks/'
                  mode: "0744"

  vars:
    ansible_connection: ssh
    ansible_python_interpreter: /usr/bin/python3
    ansible_user: admin
    ansible_become: true
    ansible_become_method: sudo
    ansible_become_flags: "-n -E"
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    ansible_remote_tmp: /tmp/.ansible/tmp
    bootloader_config_file: /boot/EFI/BOOT/grub.cfg
    hugepages: 12
