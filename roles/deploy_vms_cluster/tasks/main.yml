---
- name: Query if current node is in Pacemaker standby
  ansible.builtin.command:
    cmd: crm_attribute --node {{ inventory_hostname }} --name standby -q
  register: deploy_vms_cluster_standby_check
  changed_when: false
  failed_when: false

- name: Fail if current node is in Pacemaker standby
  ansible.builtin.fail:
    msg: >-
      Node '{{ inventory_hostname }}' is in Pacemaker standby mode.
      Cannot deploy VM '{{ item }}' on a standby node.
      Bring the node online first: crm node online {{ inventory_hostname }}
  when:
    - deploy_vms_cluster_standby_check.stdout is defined
    - "'on' == deploy_vms_cluster_standby_check.stdout"

- name: Query if current node is in Pacemaker maintenance
  ansible.builtin.command:
    cmd: crm_attribute --node {{ inventory_hostname }} --name maintenance -q
  register: deploy_vms_cluster_maintenance_check
  changed_when: false
  failed_when: false

- name: Fail if current node is in Pacemaker maintenance
  ansible.builtin.fail:
    msg: >-
      Node '{{ inventory_hostname }}' is in Pacemaker maintenance mode.
      Cannot deploy VM '{{ item }}' on this node.
      Bring the node online first: crm_attribute --node {{ inventory_hostname }} --name maintenance --delete
  when:
    - deploy_vms_cluster_maintenance_check.stdout is defined
    - "'true' == deploy_vms_cluster_maintenance_check.stdout"

- name: Check presence of vm before copy
  cluster_vm:
    command: status
    name: "{{ item }}"
  register: deploy_vms_cluster_presencevm
- ansible.builtin.debug: # noqa: name[missing]
    var: deploy_vms_cluster_presencevm
    verbosity: 2

- name: Check tmp folder permission
  ansible.builtin.file:
    path: "{{ deploy_vms_cluster_qcow2tmpuploadfolder }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  when:
    - deploy_vms_cluster_qcow2tmpuploadfolder is defined
    - deploy_vms_cluster_qcow2tmpuploadfolder != "/tmp"

- name: Provision cluster VM (create if missing or forced)
  when: deploy_vms_cluster_presencevm.status == "Undefined" or (hostvars[item].force is defined and hostvars[item].force)
  vars:
    vm_local_disk: "{{ hostvars[item].vm_disk | default(deploy_vms_cluster_vms_disks_directory ~ '/' ~ item ~ '.qcow2') }}"
    vm_remote_disk: "{{ hostvars[item].vm_remote_disk | default('') }}"
    vm_file_dest: "{{ deploy_vms_cluster_qcow2tmpuploadfolder + '/os.qcow2' }}"
    vm_disk_checksum: "{{ hostvars[item].vm_disk_checksum | default({}) }}"
    vm_disk_checksum_preference: ['sha512', 'sha384', 'sha256']
    vm_disk_checksum_unknown: "{{ (vm_disk_checksum.keys() | list) | difference(vm_disk_checksum_preference) }}"
    vm_disk_checksum_algo: "{{ (vm_disk_checksum_preference | intersect(vm_disk_checksum.keys() | list)) | first | default('') }}"
    vm_disk_checksum_hash: "{{ vm_disk_checksum[vm_disk_checksum_algo] | default('') }}"
    vm_disk_checksum_present: "{{ (vm_disk_checksum_algo | length > 0) and (vm_disk_checksum_hash | length > 0) }}"
  block:
    - name: "Validate VM disk source for {{ item }}"
      ansible.builtin.fail:
        msg: >-
          For '{{ item }}', set either vm_disk (local path on control node) or
          vm_remote_disk (URL fetched on target), not both.
      when:
        - hostvars[item].vm_disk is defined
        - hostvars[item].vm_remote_disk is defined
    - name: "Reject unsupported vm_disk_checksum keys for {{ item }}"
      ansible.builtin.fail:
        msg: >-
          hostvars[{{ item }}].vm_disk_checksum contains unsupported keys: {{ vm_disk_checksum_unknown }}.
          Supported algorithms: {{ vm_disk_checksum_preference | join(', ') }} (strongest used).
      when: vm_disk_checksum_unknown | length > 0
    - name: "Validate vm_disk_checksum shape for {{ item }}"
      ansible.builtin.fail:
        msg: >-
          hostvars[{{ item }}].vm_disk_checksum must contain at least one supported
          algorithm key ({{ vm_disk_checksum_preference | join(', ') }}) with a
          non-empty hex digest. Got: {{ vm_disk_checksum }}.
      when:
        - vm_disk_checksum | length > 0
        - not vm_disk_checksum_present
    - name: "Stage system disk for {{ item }}"
      when: deploy_vms_cluster_disk_copy | bool
      block:
        - name: "Require checksum for remote VM disk ({{ item }})"
          ansible.builtin.fail:
            msg: >-
              hostvars[{{ item }}].vm_disk_checksum is required when using vm_remote_disk
              (e.g. {sha256: '<hex>'}).
          when:
            - vm_remote_disk | length > 0
            - not vm_disk_checksum_present
        - name: "Download system disk from URL for {{ item }}"
          ansible.builtin.get_url:
            url: "{{ vm_remote_disk }}"
            dest: "{{ vm_file_dest }}"
            mode: "0644"
            checksum: "{{ vm_disk_checksum_algo }}:{{ vm_disk_checksum_hash }}"
          when: vm_remote_disk | length > 0
        - name: "Copy system disk on target for {{ item }}"  # noqa: risky-file-permissions
          ansible.builtin.copy:
            src: "{{ vm_local_disk }}"
            dest: "{{ vm_file_dest }}"
          vars:
            ansible_remote_tmp: "{{ deploy_vms_cluster_qcow2tmpuploadfolder | default(omit) }}"
          when: vm_remote_disk | length == 0
        - name: "Stat system disk for checksum verification ({{ item }})"
          ansible.builtin.stat:
            path: "{{ vm_file_dest }}"
            checksum_algorithm: "{{ vm_disk_checksum_algo }}"
            get_checksum: true
          register: deploy_vms_cluster_disk_stat
          when: vm_disk_checksum_present
        - name: "Verify system disk checksum for {{ item }}"
          ansible.builtin.assert:
            that: deploy_vms_cluster_disk_stat.stat.checksum == vm_disk_checksum_hash
            fail_msg: >-
              Checksum mismatch for {{ vm_file_dest }} on {{ inventory_hostname }}:
              expected {{ vm_disk_checksum_algo }}:{{ vm_disk_checksum_hash }},
              got {{ vm_disk_checksum_algo }}:{{ deploy_vms_cluster_disk_stat.stat.checksum | default('<none>') }}.
          when: vm_disk_checksum_present
    - name: "Create {{ item }}"
      cluster_vm:
        name: "{{ item }}"
        command: create
        system_image: "{{ vm_file_dest }}"
        force: true
        live_migration: "{{ hostvars[item].live_migration | default(false) }}"
        migration_user: "{{ livemigration_user | default(omit) }}"
        migrate_to_timeout: "{{ hostvars[item].migrate_to_timeout | default(omit) }}"
        migration_downtime: "{{ hostvars[item].migration_downtime | default(omit) }}"
        priority: "{{ hostvars[item].priority | default(omit) }}"
        enable: "{{ hostvars[item].enable | default(true) }}"
        nostart: "{{ hostvars[item].nostart | default(false) }}"
        pinned_host: "{{ hostvars[item].pinned_host | default(omit) }}"
        preferred_host: "{{ hostvars[item].preferred_host | default(omit) }}"
        crm_config_cmd: "{{ hostvars[item].crm_config_cmd | default(omit) }}"
        disk_bus: "{{ hostvars[item].disk_bus | default(omit) }}"
        xml: >-
          {{ lookup('file', hostvars[item].xml_path)
               if hostvars[item].xml_path is defined
             else lookup('template',hostvars[item].vm_template,template_vars=dict(vm=hostvars[item]))
               if hostvars[item].vm_template is defined
             else lookup('file',deploy_vms_cluster_vms_disks_directory + '/' + item + '.xml')
             | replace('\n', '') }}
    - name: Remove temporary file
      ansible.builtin.file:
        path: "{{ vm_file_dest }}"
        state: absent
    - name: Wait for VM connections
      ansible.builtin.wait_for_connection:
      delegate_to: "{{ item }}"
      when:
        - hostvars[item].wait_for_connection is defined
        - hostvars[item].wait_for_connection

- name: "Define colocation constraints for {{ item }}"
  cluster_vm:
    name: "{{ item }}"
    command: define_colocation
    strong: "{{ hostvars[item].strong_colocation | default(false) }}"
    colocated_vms: "{{ hostvars[item].colocated_vms }}"
  when: hostvars[item].colocated_vms is defined
