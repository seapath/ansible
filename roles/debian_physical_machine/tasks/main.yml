---
- name: Populate service facts
  ansible.builtin.service_facts:

- name: Temp fix for synchronize to force evaluate variables
  ansible.builtin.set_fact:
    ansible_host: "{{ ansible_host }}"

- name: Apply sysctl configurations
  ansible.builtin.import_tasks: sysctl.yml
- name: Install SEAPATH python modules
  ansible.builtin.import_tasks: python.yml
- name: Apply chrony configurations
  ansible.builtin.import_tasks: chrony.yml
- name: Apply modules configurations
  ansible.builtin.import_tasks: modules.yml
- name: Apply hosts configurations
  ansible.builtin.import_tasks: hosts.yml
- name: Apply libvirt configurations
  ansible.builtin.import_tasks: libvirt.yml
- name: Apply initramfs configurations
  ansible.builtin.import_tasks: initramfs.yml
- name: Apply LVM configurations
  ansible.builtin.import_tasks: lvm.yml
- name: Apply OpenVSwitch configurations
  ansible.builtin.import_tasks: openvswitch.yml
- name: Apply network configurations
  ansible.builtin.import_tasks: network.yml
- name: Configure SEAPATH pacemaker ressource agents
  when: "'cluster_machines' in group_names"
  ansible.builtin.include_tasks: ressource-agents.yml
- name: Configure pacemaker
  when: services['pacemaker.service'] is defined
  ansible.builtin.include_tasks: pacemaker.yml
