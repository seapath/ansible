all:
  children:
    VMs:
      hosts:
        ssc600-2:
          description: "vm abb"
          ansible_host: 192.168.216.147
          vm_template: "../templates/vm/ssc600.xml.j2"
          vm_disk: "ssc600_disk.img.gz"
          disk_extract: true
          memory: 6
          local_disk:
              - disk_file: ssc600-2.img
          cpuset: [4, 5, 6, 7]
          emulatorpin: 3
          rt_priority: 50
          ovs:
            - ovs_port: VM1.0
              mac_address: "52:54:00:c4:ff:06"
          sv_interfaces:
            - name: "enp88s0"
              mac_address: "52:54:00:c4:ff:07"
              mode: "vepa"
      vars:
        ansible_user: admin
        ansible_become: true
        ansible_become_method: sudo
        apply_network_config: true
        wait_for_connection: false
