# This playbook configures and sets up Ceph with cephadm.

---
- name: Install cephadm prerequisites
  hosts: cluster_machines
  become: true
  gather_facts: true
  tasks:
    - name: Detect SEAPATH distribution
      ansible.builtin.include_role:
        name: detect_seapath_distro
    - name: Load cephadm_install distribution-specific variables
      ansible.builtin.include_vars: "../vars/{{ seapath_distro }}_cephadm_install.yml"
    - name: Install cephadm prerequisites
      ansible.builtin.include_role:
        name: cephadm_install

- name: Prepare Ceph installation
  hosts: osds
  become: true
  gather_facts: true
  roles:
    - detect_seapath_distro
    - ceph_prepare_installation

- name: Ceph Expansion VG
  hosts: osds
  become: true
  gather_facts: true
  roles:
    - role: ceph_expansion_vg
      when: lvm_volumes is defined

- name: Ceph Expansion LV
  hosts: osds
  become: true
  gather_facts: true
  serial: 1
  roles:
    - role: ceph_expansion_lv
      when: lvm_volumes is defined

- name: Cephadm
  hosts: cluster_machines
  become: true
  roles:
    - detect_seapath_distro
    - cephadm
    - role: deploy_cephfs
      when: deploy_cephfs is defined and deploy_cephfs | bool
