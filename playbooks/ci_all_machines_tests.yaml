# Ansible playbook that runs all Cukinia's tests.

---
- name: CI Yocto - run tests
  become: true
  hosts:
    - cluster_machines
    - standalone_machine
    - VMs
  gather_facts: false
  roles:
    - ci_yocto/run_tests
  tasks:
    - name: Cyclictest
      when: skip_cyclictest is not defined or not skip_cyclictest
      ansible.builtin.include_role:
        name: cyclictest
