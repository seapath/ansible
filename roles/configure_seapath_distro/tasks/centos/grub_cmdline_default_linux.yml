---
- name: Remove GRUB_CMDLINE_LINUX_DEFAULT option in grub conf
  ansible.builtin.lineinfile:
    dest: /etc/default/grub
    regexp: "^GRUB_CMDLINE_LINUX_DEFAULT="
    state: absent
