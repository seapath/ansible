name: CI Debian

on:
  workflow_call:
  workflow_dispatch:

permissions:
  checks: write

jobs:
  call-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Standalone
            hyp-inventories: >-
              --inventory inventories_private/standalone13.yml
            vms-inventories: >-
              --inventory inventories_private/vm13standalone.yml
            vms-deployment-playbooks: >-
              playbooks/deploy_vms_standalone.yaml
          - name: Cluster
            hyp-inventories: >-
              --inventory inventories_private/cluster13.yml
            vms-inventories: >-
              --inventory inventories_private/vm13cluster.yml
            vms-deployment-playbooks: >-
              playbooks/deploy_vms_cluster.yaml
    uses: ./.github/workflows/_tests.yml
    name: Run tests
    with:
      seapath-flavor: "Debian ${{ matrix.name }}"
      compliance_matrices_folder: debian
      runner-label: "runner-RTE-13"
      inventories-repository: "git@github.com:insatomcat/seapath_inventories_ci.git"
      hyp-inventories: ${{ matrix.hyp-inventories }}
      hyp-configure-playbooks: >-
        playbooks/ci_configure.yaml
      hyp-test-playbooks: >-
        playbooks/ci_test.yaml
      vms-inventories: ${{ matrix.vms-inventories }}
      vms-deploy-playbooks: >-
        ${{ matrix.vms-deployment-playbooks }}
        playbooks/seapath_setup_prerequisdebian.yaml
        playbooks/seapath_setup_hardening.yaml
        playbooks/ci_prepare_VMs.yaml
      vms-test-playbooks: >-
        playbooks/ci_test.yaml
