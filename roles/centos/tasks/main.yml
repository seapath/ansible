---
- name: Disable vim defaults
  ansible.builtin.lineinfile:
    dest: /etc/vimrc
    regexp: '^"? *let g:skip_defaults_vim = 1$'
    line: "let g:skip_defaults_vim = 1"
    state: present
- name: Vim color syntax
  ansible.builtin.lineinfile:
    dest: /etc/vimrc
    regexp: '^"? *syntax on$'
    line: "syntax on"
    state: present
- name: Remove vimrc.local file
  ansible.builtin.file:
    path: /etc/vimrc.local
    state: absent

- name: Copy journald conf file
  ansible.builtin.copy:
    src: journald.conf
    dest: /etc/systemd/journald.conf
    mode: "0644"
  notify: Restart systemd-journald

- name: Ensure admin group exists
  ansible.builtin.group:
    name: "{{ admin_user }}"
    state: present
    gid: 1000
- name: Adding admin user
  ansible.builtin.user:
    name: "{{ admin_user }}"
    shell: /bin/bash
    group: "{{ admin_user }}"
    uid: 1000
    password: "{{ admin_passwd | default(omit) }}"
    append: false
  no_log: true
- name: Add authorized keys to admin user
  ansible.posix.authorized_key:
    user: "{{ admin_user }}"
    key: "{{ item }}"
  with_items: "{{ admin_ssh_keys }}"
  when: admin_ssh_keys is defined and admin_ssh_keys is iterable
- name: Install sudo admin user rules
  ansible.builtin.copy:
    content: |
      {{ admin_user }}   ALL=NOPASSWD:EXEC: ALL
    dest: "/etc/sudoers.d/{{ admin_user }}"
    owner: root
    group: root
    mode: "0440"
- name: Remove admin sudoers line created by build_debian_iso
  ansible.builtin.lineinfile:
    dest: /etc/sudoers
    state: absent
    regexp: "^{{ admin_user }}"
    validate: visudo -cf %s

- name: Copy sysctl rules
  ansible.builtin.copy:
    src: sysctl/{{ item }}
    dest: /etc/sysctl.d/{{ item }}
    mode: "0644"
  with_items:
    - 00-panicreboot.conf

- name: Customize /etc/environment
  ansible.builtin.lineinfile:
    dest: "/etc/environment"
    state: present
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
  vars:
    env_list:
      HISTSIZE: 2000000
      HISTFILESIZE: 2000000
      LIBVIRT_DEFAULT_URI: "qemu:///system"
      HISTTIMEFORMAT: '"%F %T "'
      EDITOR: "vim"
      SYSTEMD_EDITOR: "vim"
  with_items: "{{ env_list | dict2items }}"

- name: "PATH for admin user"
  ansible.builtin.lineinfile:
    dest: "/home/{{ admin_user }}/.bash_profile"
    regexp: "^export PATH"
    line: "export PATH=$PATH:/usr/sbin:/usr/local/sbin:/sbin"
    state: present
    create: true
    owner: "{{ admin_user }}"
    group: "{{ admin_user }}"
    mode: "0644"

- name: Remove GRUB_CMDLINE_LINUX_DEFAULT option in grub conf
  ansible.builtin.lineinfile:
    dest: /etc/default/grub
    regexp: "^GRUB_CMDLINE_LINUX_DEFAULT="
    state: absent

- name: Make sure GRUB_CMDLINE_LINUX starts with a space
  ansible.builtin.lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX=)\"([ ]*)(.*)\""
    line: '\1" \3"'
    state: present
    backrefs: true

- name: Grub conf
  ansible.builtin.lineinfile:
    dest: /etc/default/grub
    regexp: "^(GRUB_CMDLINE_LINUX=(?!.* {{ item }})\"[^\"]*)(\".*)"
    line: "\\1 {{ item }}\\2"
    state: present
    backrefs: true
  notify: Update Grub
  with_items:
    - ipv6.disable=1
    - efi=runtime
    - fsck.mode=force
    - fsck.repair=yes
    - "{{ grub_append | default([]) }}"

- name: Grub conf osprober
  ansible.builtin.lineinfile:
    dest: /etc/default/grub
    regexp: "^#?GRUB_DISABLE_OS_PROBER=.*$"
    line: "GRUB_DISABLE_OS_PROBER=true"
    state: present
  notify: Update Grub

- name: Ensure NetworkManager is started and enabled
  ansible.builtin.systemd:
    name: NetworkManager
    state: started
    enabled: true
  register: centos_nm_start

- name: Set need_reboot to true if NetworkManager state changed # noqa: no-handler
  ansible.builtin.set_fact:
    need_reboot: true # noqa: var-naming[no-role-prefix]
  when: centos_nm_start.changed
