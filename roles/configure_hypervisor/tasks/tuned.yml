---
- name: Create tuned seapath-rt profile folder
  ansible.builtin.file:
    path: "{{ configure_hypervisor_tuned_profiles_dir }}/seapath-rt-host"
    state: directory
    mode: "0755"

- name: Tuned path
  ansible.builtin.set_fact:
    configure_hypervisor_tuned_path: "{{ custom_tuned_profile_path if custom_tuned_profile_path is defined else 'tuned.conf.j2' }}"

- name: Copy seapath-rt-host tuned profile conf
  ansible.builtin.template:
    src: "{{ configure_hypervisor_tuned_path }}"
    dest: "{{ configure_hypervisor_tuned_profiles_dir }}/seapath-rt-host/tuned.conf"
    group: root
    owner: root
    mode: "0644"
  register: configure_hypervisor_tuned_conf

- name: Remove tuned dynamic tuning
  ansible.builtin.lineinfile:
    path: /etc/tuned/tuned-main.conf
    state: present
    regexp: "^#?dynamic_tuning = .*$"
    line: "dynamic_tuning = 0"
  register: configure_hypervisor_tuned_main_conf

- name: Enable tuned.service
  ansible.builtin.systemd:
    name: tuned.service
    enabled: true
    state: started

- name: Restart tuned after config change
  when: configure_hypervisor_tuned_main_conf.changed
  ansible.builtin.systemd:
    name: tuned.service
    state: restarted

- name: Get active tuned profile
  ansible.builtin.command: tuned-adm active
  changed_when: false
  register: configure_hypervisor_tuned_active
  when: isolcpus is defined

- name: Load seapath-rt-host tuned profile
  ansible.builtin.command: tuned-adm profile seapath-rt-host
  when: >
    isolcpus is defined and
    (configure_hypervisor_tuned_conf.changed or
     'seapath-rt-host' not in configure_hypervisor_tuned_active.stdout)
  changed_when: true

- name: Unload tuned profile
  ansible.builtin.command: tuned-adm off
  when: isolcpus is not defined
  changed_when: true
