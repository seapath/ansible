---
- name: Create /usr/lib/seapath directory
  ansible.builtin.file:
    path: /usr/lib/seapath
    state: directory
    mode: "0755"

- name: Copy seapath_alloc Python modules to target
  ansible.posix.synchronize:
    src: seapath_alloc/seapath_alloc/
    dest: /usr/lib/seapath/seapath_alloc/
    rsync_opts:
      - "--chown=root:root"
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--delete"
      - "--delete-excluded"

- name: Install seapath-qemu-hook entry point
  ansible.builtin.copy:
    src: seapath-qemu-hook
    dest: /usr/bin/seapath-qemu-hook
    owner: root
    group: root
    mode: "0755"

- name: Install seapath-alloc entry point
  ansible.builtin.copy:
    src: seapath-alloc
    dest: /usr/bin/seapath-alloc
    owner: root
    group: root
    mode: "0755"

- name: Install seapath-container-pin helper
  ansible.builtin.copy:
    src: seapath-container-pin
    dest: /usr/bin/seapath-container-pin
    owner: root
    group: root
    mode: "0755"

- name: Install seapath-container-unpin helper
  ansible.builtin.copy:
    src: seapath-container-unpin
    dest: /usr/bin/seapath-container-unpin
    owner: root
    group: root
    mode: "0755"

- name: Install seapath-run helper
  ansible.builtin.copy:
    src: seapath-run
    dest: /usr/bin/seapath-run
    owner: root
    group: root
    mode: "0755"

- name: Ensure /etc/libvirt/hooks/qemu.d exists
  ansible.builtin.file:
    path: /etc/libvirt/hooks/qemu.d
    state: directory
    mode: "0755"

# libvirt only discovers hook scripts at daemon startup: installing the
# hook on a host where libvirtd is already running has no effect until
# the daemon is restarted (running VMs are not affected by the restart).
- name: Register hook with libvirt
  ansible.builtin.file:
    src: /usr/bin/seapath-qemu-hook
    dest: /etc/libvirt/hooks/qemu.d/10-seapath-pinning
    state: link
  notify: Restart libvirtd

- name: Ensure /etc/seapath directory exists
  ansible.builtin.file:
    path: /etc/seapath
    state: directory
    mode: "0755"

- name: Ensure /etc/seapath/containers directory exists
  ansible.builtin.file:
    path: /etc/seapath/containers
    state: directory
    mode: "0755"

- name: Deploy alloc settings
  ansible.builtin.template:
    src: alloc.yaml.j2
    dest: /etc/seapath/alloc.yaml
    owner: root
    group: root
    mode: "0644"

- name: Ensure /var/log/seapath exists for hook log output
  ansible.builtin.file:
    path: /var/log/seapath
    state: directory
    mode: "0755"

- name: Deploy logrotate config for hook log
  ansible.builtin.copy:
    src: seapath-alloc.logrotate
    dest: /etc/logrotate.d/seapath-alloc
    owner: root
    group: root
    mode: "0644"
